services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  muleta:
    build:
      context: ../..
      dockerfile: apps/standalone/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      MULETA_REDIS_URL: redis://redis:6379
    ports:
      - "3737:3737"
