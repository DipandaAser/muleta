name: Release

on:
  push:
    branches: [main]

# Single concurrent release — never race two version PRs or two npm publishes.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # commit version bumps + tags
  pull-requests: write # open / update the "Version Packages" PR
  id-token: write # OIDC token for npm Trusted Publishing + sigstore provenance

jobs:
  release:
    name: changesets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          # changesets needs full history to read tags + diff against base.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # If @muleta-dev/server's local version isn't on npm, this run will
      # publish it. Push the matching v<version> tag *before* build so the
      # UI bundle embeds a clean `v0.1.1` badge instead of `v0.1.1+<sha>`.
      # Skip the tag push when it already exists (re-run after a failed
      # publish): the build still sees the tag, publish retries cleanly.
      - id: release-check
        run: |
          v=$(node -p "require('./packages/server/package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          if npm view "@muleta-dev/server@$v" version >/dev/null 2>&1; then
            echo "needs_tag=false" >> "$GITHUB_OUTPUT"
          elif git rev-parse --verify "refs/tags/v$v" >/dev/null 2>&1; then
            echo "Tag v$v already exists locally — skipping create, build will pick it up"
            echo "needs_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.release-check.outputs.needs_tag == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          v="${{ steps.release-check.outputs.version }}"
          git tag "v$v"
          git push origin "v$v"

      # Build after the tag is in place so vite.config.ts sees it at HEAD.
      # No-op when there are pending changesets (the action only opens the
      # version PR in that case).
      - run: pnpm build

      # npm Trusted Publishing requires a recent npm CLI. Node 24 ships
      # with an older one — bump it to the version that auto-detects the
      # GitHub OIDC token and exchanges it for a publish credential.
      - run: npm install --global npm@latest

      - id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
