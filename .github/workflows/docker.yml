name: Docker

# Publishes multi-arch (amd64 + arm64) images to GHCR under the muleta-dev
# org. The source repo currently lives on a personal account, so we auth with
# a PAT stored as GHCR_TOKEN instead of the built-in GITHUB_TOKEN — GITHUB_TOKEN
# can only write packages to the repo's owner namespace.
#
# Tag strategy:
#   push to main     → :edge, :sha-<short>
#   push tag vX.Y.Z  → :X.Y.Z, :X.Y, :X, :latest, :sha-<short>
#   workflow_dispatch → :edge, :sha-<short>   (manual smoke test)

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "apps/standalone/**"
      - "packages/**"
      - ".github/workflows/docker.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # cancelling mid-publish leaves partial tags

env:
  IMAGE_NAME: ghcr.io/muleta-dev/muleta

jobs:
  build:
    name: build + push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=edge,branch=main
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
          flavor: |
            latest=auto
          labels: |
            org.opencontainers.image.title=muleta
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Open-source BullMQ dashboard and toolkit
            org.opencontainers.image.vendor=muleta-dev
            org.opencontainers.image.licenses=Apache-2.0

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/standalone/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
